    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: "Hack", sans-serif;
            background: linear-gradient(135deg, #1a3a2e, #2d5a4a, #1a3a2e);
            color: #f0f4f0;
        }

        /* HEADER */
        header {
            text-align: center;
            padding: 60px 16px 40px;
        }

        .logo {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            letter-spacing: 6px;
            color: #fde9b6;
        }

        .tagline {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            letter-spacing: 3px;
            margin-top: 10px;
        }

        .link {
            display: inline-block;
            margin: 10px 10px 0;
            color: #d1cfca;
            text-decoration: none;
        }

        /* DIVIDER */
        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #fde9b6, transparent);
            margin: 40px 0;
        }

        /* NAV */
        #sectionNav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(26, 58, 46, 0.95);
            backdrop-filter: blur(6px);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            transform: translateY(-100%);
            transition: 0.4s ease;
            z-index: 1000;
        }

        #sectionNav.show {
            transform: translateY(0);
        }

        #sectionNav button {
            background: transparent;
            border: 1px solid #81c784;
            color: #c8e6c9;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* MENU */
        .menu-section {
            padding: 60px 12px;
        }

        .section-title {
            text-align: center;
            color: #fde9b6;
            font-size: clamp(1.4rem, 4vw, 2rem);
            letter-spacing: 4px;
            margin-bottom: 40px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        /* ITEM */
        .menu-item {
            display: flex;
            gap: 16px;
            border-bottom: 1px solid rgba(129, 199, 132, 0.2);
            padding-bottom: 20px;
        }

        .item-image {
            width: 100px;
            height: 100px;
            flex-shrink: 0;
            object-fit: cover;
            border-radius: 10px;
        }

        .item-content {
            flex: 1;
            min-width: 0;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .item-name {
            font-size: 1rem;
            word-break: break-word;
        }

        .item-price {
            font-size: 1rem;
            white-space: nowrap;
            color: #a5d6a7;
        }

        .item-description {
            font-size: 0.9rem;
            opacity: 0.85;
            margin-top: 6px;
        }

        /* DESKTOP */
        @media(min-width:768px) {
            .menu-grid {
                grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            }

            .item-image {
                width: 130px;
                height: 130px;
            }
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 60px 20px;
            opacity: 0.7;
        }
    </style>
